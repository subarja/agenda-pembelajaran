; Default PHP (php:8.4-cli-alpine) sangat ketat untuk upload masal: max_file_uploads=20,
; post_max_size=8M — cukup untuk form biasa tapi bikin upload masal foto siswa/guru
; (ratusan-ribuan file sekaligus) gagal diam-diam (blank/500) tanpa pesan jelas ke user.
; Frontend juga mengirim dalam batch (lihat BulkPhotoUploadSection di AdminPage.tsx),
; tapi nilai di sini tetap dinaikkan sebagai jaring pengaman kedua supaya tidak rapuh
; terhadap perubahan ukuran batch di masa depan.
upload_max_filesize = 60M
post_max_size = 100M
max_file_uploads = 500
memory_limit = 256M
max_execution_time = 300
max_input_time = 300
