server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api ke backend Laravel — meniru server.proxy Vite di vite.config.ts
    # supaya perilaku dev dan produksi konsisten: frontend TIDAK PERNAH perlu tahu
    # host/port backend secara eksplisit (VITE_API_URL tetap kosong), request /api
    # selalu diteruskan relatif terhadap domain yang dipakai browser mengakses app.
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA fallback — route React Router yang bukan file statis ke index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
