server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api ke backend Laravel — meniru server.proxy Vite di vite.config.ts
    # supaya perilaku dev dan produksi konsisten: frontend TIDAK PERNAH perlu tahu
    # host/port backend secara eksplisit (VITE_API_URL tetap kosong), request /api
    # selalu diteruskan relatif terhadap domain yang dipakai browser mengakses app.
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Kebijakan cache: ATURAN EMAS PWA ──
    # Asset ber-hash (folder /assets/) boleh di-cache selamanya; tapi pintu
    # masuk aplikasi (index.html, sw.js, registerSW.js, manifest) TIDAK BOLEH
    # di-cache, kalau tidak HP terus memuat versi lama meski server sudah update.

    # 1) Service worker & manifest: selalu revalidasi
    location ~* ^/(sw\.js|registerSW\.js|manifest\.webmanifest|firebase-messaging-sw\.js)$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        expires off;
    }

    # 2) Asset ber-hash: aman di-cache 1 tahun & immutable
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # SPA fallback — route React Router yang bukan file statis ke index.html
    location / {
        # index.html tidak boleh di-cache agar referensi ke asset ber-hash selalu segar
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }
}
