services:

  # ── Database ─────────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-agenda_db}
      POSTGRES_USER: ${DB_USERNAME:-agenda_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-agenda_user} -d ${DB_DATABASE:-agenda_db}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Cache & Queue ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend Laravel 11 ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      APP_DEBUG: "true"
      APP_TIMEZONE: Asia/Jakarta
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-agenda_db}
      DB_USERNAME: ${DB_USERNAME:-agenda_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_STORE: redis
      QUEUE_CONNECTION: redis
      SESSION_DRIVER: redis
      SANCTUM_STATEFUL_DOMAINS: "localhost,localhost:5173"
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Queue Worker ──────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    restart: unless-stopped
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    environment:
      APP_ENV: ${APP_ENV:-local}
      APP_KEY: ${APP_KEY:-}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-agenda_db}
      DB_USERNAME: ${DB_USERNAME:-agenda_user}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      QUEUE_CONNECTION: redis
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Frontend (placeholder) ────────────────────────────────────────────────────
  # Ganti dengan build context setelah kode frontend tersedia.
  # Contoh Vite dev: build: { context: ./frontend, dockerfile: Dockerfile }
  frontend:
    image: busybox
    command: sh -c "echo 'Frontend placeholder — ganti dengan image/build React + Vite' && sleep infinity"
    restart: "no"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  db_data:
  redis_data:
  backend_vendor:
